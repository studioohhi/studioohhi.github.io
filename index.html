<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oh( )hi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
   <style>
/* 1. Root Variables: 낭만적인 크림색을 덜어내고, 지적인 웜스톤/차콜로 변경 */
:root {
    --bg-stone: #f6f5f2; /* 차갑지도 가볍지도 않은, 묵직한 종이나 건축 마감재의 톤 */
    --text-charcoal: #1a1a1a;
    --line-hairline: rgba(26, 26, 26, 0.15); /* 도면의 그리드 역할을 할 얇은 선 */
    
    /* 대표님의 훌륭한 비대칭 여백 감각은 그대로 유지합니다 */
    --px-l: 270px;
    --px-r: 168px;
}

@media (max-width: 1024px) {
    :root {
        --px-l: 40px; /* 모바일에서는 여백 최소화 */
        --px-r: 40px;
    }
}

/* 2. Reset */
*, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* 3. Body Architecture: Garamond를 버리고 이성적인 Sans-serif(고딕) 장착 */
body {
    background-color: var(--bg-stone);
    color: var(--text-charcoal);
    
    /* Euclid Circular B 느낌을 내기 위한 시스템 기본 고딕 조합 */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
    
    font-weight: 300; /* 글씨를 얇게(Light) 써서 지적인 느낌을 줍니다 */
    line-height: 1.6;
    overflow-x: hidden;
    
    /* 좌우 여백 적용 및 도면 같은 세로 가이드라인 추가 */
    padding-left: var(--px-l);
    padding-right: var(--px-r);
    
    /* [핵심] 화면 양옆을 가로지르는 얇은 세로선. 공간을 '가두는' 건축적 장치입니다. */
    border-left: 1px solid var(--line-hairline);
    border-right: 1px solid var(--line-hairline);
    min-height: 100vh;
}

/* 4. Typography Rules: 글자의 자간(Letter-spacing)을 통제 */
h1, h2, h3, .logo {
    font-weight: 300;
    letter-spacing: -0.03em; /* 제목은 자간을 좁혀서 단단하게 */
}

p, a, li {
    font-weight: 300;
    letter-spacing: -0.01em; 
}

/* 영문 대문자 메뉴나 캡션에 쓸 클래스 (매거진 느낌) */
.caption-caps {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em; /* 대문자는 자간을 극단적으로 넓힘 */
    color: #666;
}
</style>
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="index.html">oh( )hi</a>
    <ul class="nav-menu">
      <li><a href="work.html"     data-palette="2">Work</a></li>
      <li><a href="write.html"    data-palette="3">Write</a></li>
      <li><a href="partners.html" data-palette="4">Partners</a></li>
    </ul>
  </nav>

  <section id="hero">
    <canvas id="hero-canvas"></canvas>
  </section>

  <script>
  (() => {
    const canvas = document.getElementById('hero-canvas');
    const ctx    = canvas.getContext('2d');

    function resize() {
      canvas.width  = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /* ── Color palette: white → #170A8A in 5 steps ── */
    const VIVID = [
      '#FFFFFF',   // 0
      '#C5C2E2',   // 1
      '#8B85C5',   // 2  → Work
      '#5148A8',   // 3  → Write
      '#170A8A',   // 4  → Partners
    ];

    /* Settled gray tones matching luminosity of each vivid step */
    const GRAY = [
      '#888888',
      '#787880',
      '#686870',
      '#585866',
      '#484858',
    ];

    /* ── State ── */
    let settlePhase = false;
    let hoveredPalette = -1;   // -1 = none; 0–4 = active palette index

    setTimeout(() => { settlePhase = true; }, 5500);

    /* ── Nav hover wiring ── */
    document.querySelectorAll('.nav-menu a[data-palette]').forEach(el => {
      const idx = parseInt(el.dataset.palette, 10);
      el.addEventListener('mouseenter', () => { hoveredPalette = idx; });
      el.addEventListener('mouseleave', () => { hoveredPalette = -1; });
    });

    /* ── Color helpers ── */
    function hexToRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
    }

    function lerpColor(fromHex, toHex, t) {
      const a = hexToRgb(fromHex), b = hexToRgb(toHex);
      const r = Math.round(a[0] + (b[0] - a[0]) * t);
      const g = Math.round(a[1] + (b[1] - a[1]) * t);
      const bv = Math.round(a[2] + (b[2] - a[2]) * t);
      return `rgb(${r},${g},${bv})`;
    }

    /* ── Ball ── */
    const TRAIL = 10;

    class Ball {
      constructor() {
        this.paletteIndex = Math.floor(Math.random() * VIVID.length);
        this.r     = Math.random() * 58 + 16;
        this.alpha = .88 + Math.random() * .12;
        this.trail = [];

        /* current rendered color (lerped each frame) */
        this.displayColor = VIVID[this.paletteIndex];

        const roll = Math.random();
        const spd  = Math.random() * 10 + 7;
        if (roll < .6) {
          this.x = Math.random() * canvas.width;
          this.y = -this.r * 1.5;
          this.vx = (Math.random() - .5) * spd * 1.2;
          this.vy = spd * (.4 + Math.random() * .8);
        } else if (roll < .78) {
          this.x = canvas.width + this.r;
          this.y = Math.random() * canvas.height * .75;
          this.vx = -spd * (.5 + Math.random() * .7);
          this.vy = (Math.random() - .3) * spd;
        } else {
          this.x = -this.r;
          this.y = Math.random() * canvas.height * .75;
          this.vx = spd * (.5 + Math.random() * .7);
          this.vy = (Math.random() - .3) * spd;
        }
      }

      targetColor() {
        if (!settlePhase) return VIVID[this.paletteIndex];
        /* If a nav item is hovered, balls matching that palette index become vivid */
        if (hoveredPalette !== -1 && this.paletteIndex === hoveredPalette) {
          return VIVID[this.paletteIndex];
        }
        return GRAY[this.paletteIndex];
      }

      update(all) {
        this.trail.push({ x: this.x, y: this.y });
        if (this.trail.length > TRAIL) this.trail.shift();

        /* Lerp display color toward target */
        const target = this.targetColor();
        this.displayColor = lerpColor(this.displayColor, target, 0.06);

        this.vy += .18;
        this.vx *= .989; this.vy *= .989;
        this.x += this.vx; this.y += this.vy;

        const cw = canvas.width, ch = canvas.height, r = this.r, e = .68;
        if (this.x - r < 0)  { this.x = r;    this.vx =  Math.abs(this.vx) * e; }
        if (this.x + r > cw) { this.x = cw-r; this.vx = -Math.abs(this.vx) * e; }
        if (this.y - r < 0)  { this.y = r;    this.vy =  Math.abs(this.vy) * e; }
        if (this.y + r > ch) { this.y = ch-r; this.vy = -Math.abs(this.vy) * e; }

        for (const o of all) {
          if (o === this) continue;
          const dx = o.x - this.x, dy = o.y - this.y;
          const d  = Math.hypot(dx, dy), mn = this.r + o.r;
          if (d >= mn || d === 0) continue;
          const nx = dx/d, ny = dy/d, ov = (mn-d)*.5;
          this.x -= nx*ov; this.y -= ny*ov;
          o.x    += nx*ov; o.y    += ny*ov;
          const dvx = this.vx - o.vx, dvy = this.vy - o.vy;
          const dot = dvx*nx + dvy*ny;
          if (dot <= 0) continue;
          const m1 = this.r*this.r, m2 = o.r*o.r, tm = m1+m2;
          const imp = (2*dot*.74)/tm;
          this.vx -= imp*m2*nx; this.vy -= imp*m2*ny;
          o.vx    += imp*m1*nx; o.vy    += imp*m1*ny;
        }
      }

      draw() {
        /* Ghost trail: outline circles */
        for (let i = 0; i < this.trail.length; i++) {
          const t  = (i+1) / this.trail.length;
          const pt = this.trail[i];
          ctx.save();
          ctx.globalAlpha = t * t * .28;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, this.r, 0, Math.PI*2);
          ctx.strokeStyle = this.displayColor;
          ctx.lineWidth   = 1.2;
          ctx.stroke();
          ctx.restore();
        }
        /* Main ball: flat fill */
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
        ctx.fillStyle = this.displayColor;
        ctx.fill();
        ctx.restore();
      }
    }

    const balls = [];
    for (let i = 0; i < 20; i++) setTimeout(() => balls.push(new Ball()), i * 100);

    (function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const b of balls) { b.update(balls); b.draw(); }
      requestAnimationFrame(loop);
    })();
  })();
  </script>
</body>
</html>
